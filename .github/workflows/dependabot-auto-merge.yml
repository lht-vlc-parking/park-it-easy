name: Dependabot Auto-merge

on:
  pull_request_target:
    branches: [main]

permissions: {}

concurrency:
  group: dependabot-auto-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@08eff52bf64351f401fb50d4972fa95b9f2c2d1b # v2.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # No wait-on-check-action needed: GitHub's --auto merge will hold the PR
      # until all required status checks (configured in branch protection)
      # succeed. This makes the workflow finish in seconds instead of minutes.

      - name: Approve PR
        # Requires "Allow GitHub Actions to create and approve pull requests"
        # under Settings → Actions → General → Workflow permissions.
        # Non-fatal: if branch protection doesn't require approvals, the
        # merge step below can still proceed.
        continue-on-error: true
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major version updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ **Major version update auto-merged** for \`${{ steps.metadata.outputs.dependency-names }}\`.

          All CI checks (lint, unit tests, build, E2E) passed. If you observe any regression, revert this PR."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
